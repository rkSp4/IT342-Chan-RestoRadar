# Load secrets from a separate file that is ignored by Git
spring.config.import=optional:classpath:application-secrets.properties

spring.application.name=restoradar
spring.main.allow-circular-references=true

# Database
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.idpagpzstxjeimimgixk
spring.datasource.password=${spring.datasource.password:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=${jwt.secret:}
jwt.expiration=900000
jwt.refresh.expiration=604800000

spring.security.oauth2.client.registration.google.client-id=${spring.security.oauth2.client.registration.google.client-id:}
